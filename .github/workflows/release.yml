name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: tally-mac-arm
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: tally-linux-x86_64
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ format('refs/tags/{0}', env.RELEASE_TAG) }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Validate release version
        shell: bash
        run: |
          package_version=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          release_version=${RELEASE_TAG#v}
          if [[ $release_version =~ ^[0-9]+\.[0-9]+$ ]]; then
            release_version="${release_version}.0"
          fi
          test "$release_version" = "$package_version"
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Name release binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/tally ${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  build-wasix:
    name: Build browser runtime
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ format('refs/tags/{0}', env.RELEASE_TAG) }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate release version
        shell: bash
        run: |
          package_version=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          release_version=${RELEASE_TAG#v}
          if [[ $release_version =~ ^[0-9]+\.[0-9]+$ ]]; then
            release_version="${release_version}.0"
          fi
          test "$release_version" = "$package_version"
      - name: Install host linker
        run: sudo apt-get install -y lld
      - uses: wasix-org/cargo-wasix@89980447bc9b6c001f5631c1598780d3dcb6f17d
        with:
          version: "0.1.31"
          toolchain-version: "v2026-07-07.3+rust-1.96"
          locked: "true"
      - name: Build WASIX binary
        run: |
          rm Cargo.lock
          cargo wasix build --release
      - name: Name browser runtime
        run: cp target/wasm32-wasmer-wasi/release/tally.wasm tally.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: tally-browser-runtime
          path: tally.wasm

  publish:
    needs: [build, build-wasix]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ format('refs/tags/{0}', env.RELEASE_TAG) }}
          path: source
      - name: Require existing release tag
        shell: bash
        run: git ls-remote --exit-code "https://github.com/${{ github.repository }}.git" "refs/tags/$RELEASE_TAG"
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Publish browser runtime branch
        shell: bash
        run: |
          cd source
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch --orphan browser-runtime
          git rm -rf . >/dev/null 2>&1 || true
          cp ../release/tally.wasm tally.wasm
          printf '# Tally browser runtime\n\nGenerated from %s.\n' "$RELEASE_TAG" > README.md
          git add tally.wasm README.md
          git commit -m "Publish browser runtime $RELEASE_TAG"
          git push --force origin HEAD:browser-runtime
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            release/tally-mac-arm
            release/tally-linux-x86_64
