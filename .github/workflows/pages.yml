name: Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-binary:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: tally-linux-x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - artifact: tally-linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - artifact: tally-macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p out
          cp "target/${{ matrix.target }}/release/tally" "out/${{ matrix.artifact }}"
          chmod 755 "out/${{ matrix.artifact }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/${{ matrix.artifact }}
          if-no-files-found: error

  deploy-pages:
    name: Deploy GitHub Pages
    needs: build-binary
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: downloaded
          merge-multiple: true

      - name: Assemble static site
        shell: bash
        run: |
          mkdir -p dist/bin dist/tally/bin
          cp -R site/. dist/
          cp downloaded/tally-* dist/bin/
          cp downloaded/tally-* dist/tally/bin/
          touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
