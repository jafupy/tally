name: WASIX

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install host linker
        run: sudo apt-get update && sudo apt-get install -y lld
      - uses: wasix-org/cargo-wasix@v0.1.31
        with:
          version: "0.1.31"
          toolchain-version: "v2026-07-07.3+rust-1.96"
          locked: "true"
      - name: Build
        id: build
        continue-on-error: true
        run: |
          rm Cargo.lock
          cargo wasix build --release > wasix-build.log 2>&1
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wasix-build-log
          path: wasix-build.log
      - name: Report build failure
        if: steps.build.outcome == 'failure'
        run: |
          cat wasix-build.log
          exit 1
      - name: Install Wasmer
        run: curl -sSfL https://get.wasmer.io | sh
      - name: Smoke test
        run: ~/.wasmer/bin/wasmer run target/wasm32-wasmer-wasi/release/tally.wasm -- --version
