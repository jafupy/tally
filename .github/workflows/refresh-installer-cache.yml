name: Refresh installer cache

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: [site/install.sh]

jobs:
  redeploy-site:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger jafupy.com deployment
        env:
          DEPLOY_HOOK: ${{ secrets.JAFUPY_COM_DEPLOY_HOOK }}
        run: |
          test -n "$DEPLOY_HOOK" || {
            echo "Set the JAFUPY_COM_DEPLOY_HOOK repository secret to a Vercel deploy-hook URL."
            exit 1
          }
          curl --fail --show-error --silent --request POST "$DEPLOY_HOOK"
